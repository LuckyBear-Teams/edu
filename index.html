<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教育コンテンツ一覧</title>
<style>
* {
  box-sizing: border-box;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  margin: 0;
  padding: 24px;
}
.container {
  max-width: 900px;
  margin: 0 auto;
}
h1 {
  font-size: 20px;
  color: #e6edf3;
  margin-bottom: 4px;
}
.subtitle {
  color: #8b949e;
  font-size: 13px;
  margin-bottom: 20px;
  word-break: break-all;
}
.status {
  font-size: 13px;
  color: #8b949e;
  margin-bottom: 12px;
  min-height: 18px;
}
.status.error {
  color: #f85149;
}
.tree {
  border: 1px solid #30363d;
  border-radius: 8px;
  overflow: hidden;
}
.entry {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid #21262d;
  font-size: 14px;
}
.entry:last-child {
  border-bottom: none;
}
.entry:hover {
  background: #161b22;
}
.entry .icon {
  width: 22px;
  flex-shrink: 0;
  text-align: center;
}
.entry .name {
  flex: 1;
  word-break: break-all;
  cursor: pointer;
}
.entry.dir .name {
  color: #58a6ff;
}
.entry a.name {
  color: #c9d1d9;
  text-decoration: none;
}
.entry a.name:hover {
  text-decoration: underline;
}
.entry .meta {
  color: #8b949e;
  font-size: 12px;
  margin-left: 8px;
  flex-shrink: 0;
}
.children {
  display: none;
}
.children.open {
  display: block;
}
.breadcrumbs {
  font-size: 13px;
  margin-bottom: 10px;
  color: #8b949e;
}
.breadcrumbs a {
  color: #58a6ff;
  text-decoration: none;
  cursor: pointer;
}
.breadcrumbs a:hover {
  text-decoration: underline;
}
.spinner {
  display: inline-block;
  width: 12px;
  height: 12px;
  border: 2px solid #30363d;
  border-top-color: #58a6ff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 6px;
  vertical-align: middle;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="container">
  <h1>教育コンテンツ一覧</h1>

  <div class="status" id="status"></div>

  <div class="tree" id="tree"></div>
</div>

<script>
var OWNER = "luckybear-teams";
var REPO = "edu";
var API_BASE = "https://api.github.com/repos/" + OWNER + "/" + REPO + "/contents/";
var PAGES_BASE = "https://" + OWNER + ".github.io/" + REPO + "/";

var statusEl = document.getElementById("status");
var treeEl = document.getElementById("tree");

function setStatus(msg, isError) {
  statusEl.textContent = msg;
  statusEl.className = isError ? "status error" : "status";
}

function iconFor(item) {
  if (item.type === "dir") return "📁";
  var name = item.name.toLowerCase();
  if (name.match(/\.(png|jpg|jpeg|gif|svg|webp|ico)$/)) return "🖼️";
  if (name.match(/\.(html|htm)$/)) return "🌐";
  if (name.match(/\.(js|ts|jsx|tsx)$/)) return "📜";
  if (name.match(/\.(css|scss|less)$/)) return "🎨";
  if (name.match(/\.(md|txt)$/)) return "📝";
  if (name.match(/\.(json|yml|yaml|xml)$/)) return "⚙️";
  if (name.match(/\.(zip|tar|gz|rar)$/)) return "🗜️";
  if (name.match(/\.(pdf)$/)) return "📕";
  return "📄";
}

function formatSize(bytes) {
  if (bytes === undefined || bytes === null) return "";
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}

async function fetchContents(path) {
  var url = API_BASE + path;
  var res = await fetch(url);
  if (!res.ok) {
    var body = null;
    try { body = await res.json(); } catch (e) {}
    var msg = "取得に失敗しました (" + res.status + ")";
    if (body && body.message) msg += ": " + body.message;
    throw new Error(msg);
  }
  return res.json();
}

function makeEntryRow(item, container) {
  var row = document.createElement("div");
  row.className = "entry" + (item.type === "dir" ? " dir" : "");

  var icon = document.createElement("span");
  icon.className = "icon";
  icon.textContent = iconFor(item);
  row.appendChild(icon);

  if (item.type === "dir") {
    var name = document.createElement("span");
    name.className = "name";
    name.textContent = item.name;
    row.appendChild(name);

    var meta = document.createElement("span");
    meta.className = "meta";
    row.appendChild(meta);

    var childrenWrap = document.createElement("div");
    childrenWrap.className = "children";
    childrenWrap.style.paddingLeft = "20px";
    var loaded = false;

    row.addEventListener("click", async function () {
      var isOpen = childrenWrap.classList.contains("open");
      if (isOpen) {
        childrenWrap.classList.remove("open");
        icon.textContent = "📁";
        return;
      }
      icon.innerHTML = '<span class="spinner"></span>';
      if (!loaded) {
        try {
          var items = await fetchContents(item.path);
          items.sort(function (a, b) {
            if (a.type !== b.type) return a.type === "dir" ? -1 : 1;
            return a.name.localeCompare(b.name);
          });
          items.forEach(function (child) {
            makeEntryRow(child, childrenWrap);
          });
          loaded = true;
        } catch (err) {
          setStatus(err.message, true);
        }
      }
      icon.textContent = "📁";
      childrenWrap.classList.add("open");
    });

    container.appendChild(row);
    container.appendChild(childrenWrap);
  } else {
    var link = document.createElement("a");
    link.className = "name";
    link.textContent = item.name;
    link.href = PAGES_BASE + item.path;
    link.target = "_blank";
    link.rel = "noopener noreferrer";
    row.appendChild(link);

    var meta2 = document.createElement("span");
    meta2.className = "meta";
    meta2.textContent = formatSize(item.size);
    row.appendChild(meta2);

    container.appendChild(row);
  }
}

async function buildTree(path) {
  treeEl.innerHTML = "";
  setStatus("");
  try {
    var items = await fetchContents(path);
    items = items.filter(function (item) {
      return item.path !== "src" && item.path.indexOf("src/") !== 0;
    });
    items.sort(function (a, b) {
      if (a.type !== b.type) return a.type === "dir" ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
    if (items.length === 0) {
      setStatus("まだフォルダはありません");
    } else {
      items.forEach(function (item) {
        makeEntryRow(item, treeEl);
      });
    }
  } catch (err) {
    setStatus(err.message, true);
  }
}

buildTree("");
</script>
</body>
</html>
